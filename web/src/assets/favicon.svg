<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- outer ring shows page background (#F5F1EB) -->
  <circle cx="11" cy="11" r="11" fill="#F5F1EB"/>
  <!-- dark sphere: 60% of farthest-corner (11√2 ≈ 15.56px) → r ≈ 9.3 -->
  <circle cx="11" cy="11" r="9.3" fill="#1A1A18"/>
  <!-- highlight dot: centered at 35%×22=7.7, radius 4px -->
  <circle cx="7.7" cy="7.7" r="4" fill="#F5F1EB"/>
  <!-- inset 1px border -->
  <circle cx="11" cy="11" r="10.5" stroke="#1A1A18" stroke-width="1"/>
</svg>
